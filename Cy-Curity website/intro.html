<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cyber Cy-Curity</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      font-family: 'JetBrains Mono', monospace;
    }

    /* ── MATRIX CANVAS ─────────────────────────────── */
    #matrix {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
    }

    /* ── SCANLINES OVERLAY ─────────────────────────── */
    #scanlines {
      position: fixed; inset: 0; z-index: 1; pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.08) 2px,
        rgba(0,0,0,0.08) 4px
      );
    }

    /* ── VIGNETTE ──────────────────────────────────── */
    #vignette {
      position: fixed; inset: 0; z-index: 2; pointer-events: none;
      background: radial-gradient(
        ellipse 80% 80% at 50% 50%,
        transparent 40%,
        rgba(0,0,0,0.75) 100%
      );
    }

    /* ── CENTER CONTENT ────────────────────────────── */
    #center {
      position: fixed; inset: 0; z-index: 10;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 0;
    }

    /* ── LOGO ──────────────────────────────────────── */
    #logo-wrap {
      text-align: center;
      margin-bottom: 56px;
      animation: logo-in 1.4s cubic-bezier(0.23,1,0.32,1) both;
      animation-delay: 0.6s;
    }

    #logo-sub {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      font-weight: 500;
      color: rgba(46,134,255,0.70);
      letter-spacing: 0.35em;
      text-transform: uppercase;
      margin-bottom: 14px;
      opacity: 0;
      animation: fade-in 0.8s 1.0s ease forwards;
    }

    #logo-text {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2.8rem, 7vw, 6rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1;
      color: #fff;
      text-shadow:
        0 0 30px rgba(46,134,255,0.60),
        0 0 80px rgba(46,134,255,0.25),
        0 0 160px rgba(46,134,255,0.12);
      position: relative;
    }

    #logo-text .accent {
      color: #2E86FF;
      text-shadow:
        0 0 20px rgba(46,134,255,0.90),
        0 0 60px rgba(46,134,255,0.50),
        0 0 120px rgba(46,134,255,0.30);
    }

    /* glitch layers */
    #logo-text::before,
    #logo-text::after {
      content: attr(data-text);
      position: absolute; top: 0; left: 0; right: 0;
      overflow: hidden;
    }
    #logo-text::before {
      color: #00ffcc;
      clip-path: polygon(0 20%, 100% 20%, 100% 40%, 0 40%);
      transform: translateX(-3px);
      animation: glitch-a 4s infinite step-start;
      opacity: 0.5;
    }
    #logo-text::after {
      color: #ff2e6b;
      clip-path: polygon(0 60%, 100% 60%, 100% 75%, 0 75%);
      transform: translateX(3px);
      animation: glitch-b 4s infinite step-start;
      opacity: 0.5;
    }

    @keyframes glitch-a {
      0%,90%,100% { transform: translateX(0); opacity:0; }
      92%  { transform: translateX(-4px) skewX(-1deg); opacity:0.6; }
      94%  { transform: translateX(3px);  opacity:0.4; }
      96%  { transform: translateX(-2px); opacity:0.5; }
      98%  { transform: translateX(0);    opacity:0; }
    }
    @keyframes glitch-b {
      0%,90%,100% { transform: translateX(0); opacity:0; }
      93%  { transform: translateX(4px) skewX(1deg);  opacity:0.6; }
      95%  { transform: translateX(-3px); opacity:0.4; }
      97%  { transform: translateX(2px);  opacity:0.5; }
      99%  { transform: translateX(0);    opacity:0; }
    }

    #logo-tagline {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78rem;
      color: rgba(255,255,255,0.28);
      letter-spacing: 0.20em;
      text-transform: uppercase;
      margin-top: 18px;
      opacity: 0;
      animation: fade-in 0.8s 1.3s ease forwards;
    }

    @keyframes logo-in {
      from { opacity:0; transform: scale(0.92) translateY(20px); }
      to   { opacity:1; transform: scale(1) translateY(0); }
    }
    @keyframes fade-in {
      to { opacity: 1; }
    }

    /* ── BUTTON ────────────────────────────────────── */
    #btn-wrap {
      opacity: 0;
      animation: fade-in 0.8s 1.8s ease forwards;
    }

    #cta-btn {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #2E86FF;
      background: transparent;
      border: 1px solid rgba(46,134,255,0.45);
      border-radius: 4px;
      padding: 16px 40px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: color 0.25s, border-color 0.25s, box-shadow 0.25s;
      box-shadow: 0 0 20px rgba(46,134,255,0.08);
    }

    /* button shimmer sweep */
    #cta-btn::before {
      content: '';
      position: absolute; top: 0; left: -100%; width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(46,134,255,0.12), transparent);
      transition: none;
    }
    #cta-btn:hover::before {
      animation: btn-sweep 0.6s ease forwards;
    }
    @keyframes btn-sweep {
      to { left: 150%; }
    }

    #cta-btn:hover {
      color: #fff;
      border-color: #2E86FF;
      box-shadow:
        0 0 0 1px rgba(46,134,255,0.40),
        0 0 28px rgba(46,134,255,0.30),
        inset 0 0 20px rgba(46,134,255,0.06);
    }

    /* idle shake — starts after 3s, loops every 6s */
    #cta-btn.idle-shake {
      animation: btn-shake 0.5s ease;
    }

    @keyframes btn-shake {
      0%,100% { transform: translateX(0); }
      10%     { transform: translateX(-6px) rotate(-1deg); }
      20%     { transform: translateX(6px)  rotate(1deg); }
      30%     { transform: translateX(-5px); }
      40%     { transform: translateX(5px); }
      50%     { transform: translateX(-3px); }
      60%     { transform: translateX(3px); }
      70%     { transform: translateX(-2px); }
      80%     { transform: translateX(2px); }
    }

    /* ── SCREEN SHAKE ──────────────────────────────── */
    @keyframes screen-shake {
      0%        { transform: translate(0,0) rotate(0deg); }
      5%        { transform: translate(-12px, 8px) rotate(-0.8deg); }
      10%       { transform: translate(14px, -10px) rotate(0.9deg); }
      15%       { transform: translate(-10px, 6px) rotate(-0.5deg); }
      20%       { transform: translate(16px, -8px) rotate(0.7deg); }
      25%       { transform: translate(-8px, 12px) rotate(-0.6deg); }
      30%       { transform: translate(10px, -6px) rotate(0.4deg); }
      40%       { transform: translate(-6px, 4px) rotate(-0.3deg); }
      50%       { transform: translate(6px, -4px) rotate(0.2deg); }
      65%       { transform: translate(-3px, 2px) rotate(-0.1deg); }
      80%       { transform: translate(2px, -1px); }
      100%      { transform: translate(0,0) rotate(0deg); }
    }

    @keyframes flash-white {
      0%   { opacity: 0; }
      15%  { opacity: 0.55; }
      35%  { opacity: 0.20; }
      55%  { opacity: 0.40; }
      75%  { opacity: 0.10; }
      100% { opacity: 0; }
    }

    @keyframes glitch-full {
      0%,100% { clip-path: none; transform: none; }
      10%  { clip-path: polygon(0 15%, 100% 15%, 100% 30%, 0 30%); transform: translateX(-8px); }
      20%  { clip-path: polygon(0 55%, 100% 55%, 100% 70%, 0 70%); transform: translateX(6px); }
      30%  { clip-path: polygon(0 80%, 100% 80%, 100% 90%, 0 90%); transform: translateX(-4px); }
      40%  { clip-path: none; transform: none; }
      50%  { clip-path: polygon(0 5%,  100% 5%,  100% 18%, 0 18%); transform: translateX(5px); }
      60%  { clip-path: polygon(0 40%, 100% 40%, 100% 55%, 0 55%); transform: translateX(-6px); }
      70%  { clip-path: none; transform: none; }
    }

    body.shaking {
      animation: screen-shake 0.9s cubic-bezier(0.36,0.07,0.19,0.97) both;
    }

    #flash {
      position: fixed; inset: 0; z-index: 999;
      background: #fff;
      pointer-events: none;
      opacity: 0;
    }
    body.shaking #flash {
      animation: flash-white 0.9s ease both;
    }

    /* glitch overlay during shake */
    #glitch-overlay {
      position: fixed; inset: 0; z-index: 998;
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(255,0,100,0.12) 0%, transparent 40%, rgba(0,200,255,0.10) 100%);
      opacity: 0;
    }
    body.shaking #glitch-overlay {
      animation: flash-white 0.9s ease both;
    }

    /* ── FADE OUT ───────────────────────────────────── */
    #fade-out {
      position: fixed; inset: 0; z-index: 1000;
      background: #000;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    #fade-out.active { opacity: 1; }

    /* ── CORNER DECOR ──────────────────────────────── */
    .corner {
      position: fixed; z-index: 5;
      width: 48px; height: 48px;
      opacity: 0;
      animation: fade-in 0.5s 2.2s ease forwards;
    }
    .corner svg { width: 100%; height: 100%; }
    .corner.tl { top: 28px; left: 28px; }
    .corner.tr { top: 28px; right: 28px; transform: scaleX(-1); }
    .corner.bl { bottom: 28px; left: 28px; transform: scaleY(-1); }
    .corner.br { bottom: 28px; right: 28px; transform: scale(-1,-1); }

    /* ── STATUS LINE ───────────────────────────────── */
    #status {
      position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
      z-index: 10;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.62rem;
      color: rgba(46,134,255,0.40);
      letter-spacing: 0.20em;
      text-transform: uppercase;
      opacity: 0;
      animation: fade-in 0.8s 2.4s ease forwards;
    }
    #status .blink { animation: blink 1.4s step-end infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  </style>
</head>
<body>

  <!-- Matrix canvas -->
  <canvas id="matrix"></canvas>

  <!-- Overlays -->
  <div id="scanlines"></div>
  <div id="vignette"></div>
  <div id="flash"></div>
  <div id="glitch-overlay"></div>
  <div id="fade-out"></div>

  <!-- Corner decorations -->
  <div class="corner tl">
    <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M2 24 L2 2 L24 2" stroke="rgba(46,134,255,0.50)" stroke-width="1.5" fill="none"/>
      <path d="M2 12 L2 2 L12 2" stroke="rgba(46,134,255,0.80)" stroke-width="1" fill="none"/>
      <circle cx="2" cy="2" r="2" fill="#2E86FF" opacity="0.8"/>
    </svg>
  </div>
  <div class="corner tr">
    <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M2 24 L2 2 L24 2" stroke="rgba(46,134,255,0.50)" stroke-width="1.5" fill="none"/>
      <path d="M2 12 L2 2 L12 2" stroke="rgba(46,134,255,0.80)" stroke-width="1" fill="none"/>
      <circle cx="2" cy="2" r="2" fill="#2E86FF" opacity="0.8"/>
    </svg>
  </div>
  <div class="corner bl">
    <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M2 24 L2 2 L24 2" stroke="rgba(46,134,255,0.50)" stroke-width="1.5" fill="none"/>
      <path d="M2 12 L2 2 L12 2" stroke="rgba(46,134,255,0.80)" stroke-width="1" fill="none"/>
      <circle cx="2" cy="2" r="2" fill="#2E86FF" opacity="0.8"/>
    </svg>
  </div>
  <div class="corner br">
    <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M2 24 L2 2 L24 2" stroke="rgba(46,134,255,0.50)" stroke-width="1.5" fill="none"/>
      <path d="M2 12 L2 2 L12 2" stroke="rgba(46,134,255,0.80)" stroke-width="1" fill="none"/>
      <circle cx="2" cy="2" r="2" fill="#2E86FF" opacity="0.8"/>
    </svg>
  </div>

  <!-- Center content -->
  <div id="center">
    <div id="logo-wrap">
      <div id="logo-sub">// Cybersecurity Consulting //</div>
      <div id="logo-text" data-text="Cyber Cy-Curity">
        Cyber <span class="accent">Cy-Curity</span>
      </div>
      <div id="logo-tagline">Protect · Detect · Respond</div>
    </div>

    <div id="btn-wrap">
      <button id="cta-btn" onclick="triggerLaunch()">
        Begin Your Path to Security
      </button>
    </div>
  </div>

  <!-- Status bar -->
  <div id="status">
    System ready <span class="blink">_</span>
  </div>

  <script>
    /* ── MATRIX RAIN ─────────────────────────────────── */
    const canvas  = document.getElementById('matrix');
    const ctx     = canvas.getContext('2d');
    const chars   = '01010110001010100110101001011010001101010110100101';
    let cols, drops;

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
      cols  = Math.floor(canvas.width / 18);
      drops = Array(cols).fill(0).map(() => Math.random() * -80);
    }
    resize();
    window.addEventListener('resize', resize);

    function drawMatrix() {
      // Dark fade trail
      ctx.fillStyle = 'rgba(0,0,0,0.055)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      for (let i = 0; i < drops.length; i++) {
        const y = drops[i];
        const x = i * 18;

        // Leading character — bright blue-white
        const r = Math.random();
        if (r < 0.02) {
          // Rare bright white flash
          ctx.fillStyle = 'rgba(200,225,255,0.95)';
          ctx.font = 'bold 14px "JetBrains Mono", monospace';
        } else if (drops[i] * 18 > canvas.height * 0.7) {
          // Lower section — dim
          ctx.fillStyle = 'rgba(46,100,200,0.25)';
          ctx.font = '13px "JetBrains Mono", monospace';
        } else {
          // Normal — blue tones
          const brightness = 0.35 + Math.random() * 0.45;
          ctx.fillStyle = `rgba(46,134,255,${brightness})`;
          ctx.font = '13px "JetBrains Mono", monospace';
        }

        const char = chars[Math.floor(Math.random() * chars.length)];
        ctx.fillText(char, x, y * 18);

        // Reset column
        if (y * 18 > canvas.height && Math.random() > 0.975) {
          drops[i] = 0;
        }
        drops[i] += 0.35 + Math.random() * 0.25;
      }
    }

    setInterval(drawMatrix, 42);

    /* ── IDLE BUTTON SHAKE ───────────────────────────── */
    const btn = document.getElementById('cta-btn');
    let shakeInterval;

    function scheduleShake() {
      shakeInterval = setTimeout(function shake() {
        btn.classList.remove('idle-shake');
        void btn.offsetWidth; // reflow
        btn.classList.add('idle-shake');
        btn.addEventListener('animationend', () => {
          btn.classList.remove('idle-shake');
          shakeInterval = setTimeout(shake, 5000);
        }, { once: true });
      }, 3200);
    }
    scheduleShake();

    /* ── LAUNCH SEQUENCE ─────────────────────────────── */
    function triggerLaunch() {
      // Kill idle shake
      clearTimeout(shakeInterval);
      btn.disabled = true;

      // Ramp up matrix speed temporarily
      let fast = true;
      const fastInterval = setInterval(() => {
        if (!fast) { clearInterval(fastInterval); return; }
        for (let i = 0; i < drops.length; i++) drops[i] += 1.5;
      }, 16);

      // Screen shake
      document.body.classList.add('shaking');

      document.body.addEventListener('animationend', function onShakeEnd(e) {
        if (e.animationName !== 'screen-shake') return;
        document.body.removeEventListener('animationend', onShakeEnd);
        fast = false;
        clearInterval(fastInterval);

        // Fade to black then navigate
        const fadeEl = document.getElementById('fade-out');
        fadeEl.classList.add('active');
        setTimeout(() => {
          window.location.href = 'index.html';
        }, 550);
      });
    }
  </script>
</body>
</html>
